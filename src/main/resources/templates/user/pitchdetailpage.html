<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{pitch.detail.title}">Pitch Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/pitchdetail.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
<div class="home-container">
    <div th:replace="layouts/sidebar :: sidebar"></div>

    <div class="main-content">
        <h2 th:text="#{pitch.detail.heading}">Pitch Detail</h2>

        <div id="pitchDetailContainer">
            <p th:text="#{branch.loading}">Loading...</p>
        </div>

        <div class="gallery-container">
            <button class="gallery-nav" id="galleryPrev">←</button>
            <div class="gallery-images" id="galleryImages"></div>
            <button class="gallery-nav" id="galleryNext">→</button>
        </div>

        <div class="review-section">
            <div class="review-header">
                <h4>
                    <span th:text="#{review.average}">Average Rating:</span>
                    <span id="avgRating">0</span>
                </h4>
            </div>

            <div id="reviewFormWrapper" class="review-form-wrapper">
                <div class="review-form-header">
                    <h4 th:text="#{review.yourReview}">Your Review</h4>
                    <p id="reviewAuthMessage" class="review-auth-message"></p>
                </div>

                <form id="reviewForm" class="review-form" style="display: none;">
                    <div class="review-form-row">
                        <label th:text="#{review.rating}">Rating</label>
                        <div id="ratingStars" class="rating-stars"></div>
                        <input type="hidden" id="ratingValue" value="5">
                    </div>

                    <div class="review-form-row">
                        <label for="reviewContent" th:text="#{review.comment}">Comment</label>
                        <textarea
                            id="reviewContent"
                            class="review-textarea"
                            rows="4"
                            th:placeholder="#{review.placeholder}"
                            placeholder="Write your review..."
                        ></textarea>
                    </div>

                    <div class="review-form-actions">
                        <button type="submit" class="booking-btn" th:text="#{review.submit}">Submit Review</button>
                    </div>
                </form>
            </div>

            <div id="reviewsContainer" class="reviews-list">
                <p th:text="#{review.none}">No reviews yet</p>
            </div>
        </div>

        <a href="/user/home" class="back-btn" th:text="#{pitch.back}">← Back to Pitches</a>
    </div>
</div>

<script th:inline="javascript">
    const i18n = {
        loading: /*[[#{branch.loading}]]*/ "Loading...",
        error: /*[[#{branch.error}]]*/ "Error loading data",
        fetchFailed: /*[[#{branch.fetchFailed}]]*/ "Failed to fetch data",
        location: /*[[#{pitch.location}]]*/ "Location:",
        description: /*[[#{pitch.description}]]*/ "Description:",
        branch: /*[[#{pitch.branch}]]*/ "Branch:",
        type: /*[[#{pitch.type}]]*/ "Type:",
        status: /*[[#{pitch.status}]]*/ "Status:",
        active: /*[[#{pitch.active}]]*/ "Active",
        inactive: /*[[#{pitch.inactive}]]*/ "Inactive",
        booking: /*[[#{pitch.booking}]]*/ "Booking",

        reviewNone: /*[[#{review.none}]]*/ "No reviews yet",
        reviewLoginRequired: /*[[#{review.loginRequired}]]*/ "You need to log in to review this pitch.",
        reviewUserOnly: /*[[#{review.userOnly}]]*/ "Only user accounts can review this pitch.",
        reviewSubmitFailed: /*[[#{review.submitFailed}]]*/ "Failed to submit review.",
        reviewSubmitError: /*[[#{review.submitError}]]*/ "An error occurred while submitting the review."
    };

    const pitchId = /*[[${pitchId}]]*/ null;
</script>

<script src="/js/pitchdetail.js"></script>
</body>
</html>
