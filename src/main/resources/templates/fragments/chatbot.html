<div th:fragment="chatbot">

  <!-- CHATBOT CSS -->
  <link rel="stylesheet" th:href="@{/css/chatbot.css}">

  <!-- CHATBOT ICON -->
  <div id="chatbot-icon">
    <i class="fa-solid fa-comments"></i>
  </div>

  <!-- CHAT WINDOW -->
  <div id="chatbot-window" class="hidden">
    <div class="chat-header">
      <span>Football Assistant</span>
      <button id="chatbot-close">✖</button>
    </div>

    <div id="chatbot-messages"></div>

    <div class="chat-input">
      <input id="chatbot-input" placeholder="Hỏi về sân bóng..." />
      <button id="chatbot-send">Gửi</button>
    </div>
  </div>

  <!-- CHATBOT JS -->
  <script th:src="@{/js/chatbot.js}" defer></script>

</div>
